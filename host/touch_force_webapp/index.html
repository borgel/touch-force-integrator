<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>touchforce.v1 test harness</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 2rem 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      font-size: 15px;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0 0 1.25rem;
      letter-spacing: -0.01em;
    }

    /* ---- banners ---- */
    .banner {
      padding: 0.65rem 0.9rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .banner-warn {
      background: #fff3cd;
      border: 1px solid #ffe08a;
      color: #7a5700;
    }
    .hidden { display: none; }

    /* ---- controls ---- */
    .controls {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    button {
      padding: 0.45rem 1.1rem;
      border: none;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.1s;
    }
    button:disabled {
      opacity: 0.45;
      cursor: default;
    }
    button.primary {
      background: #2563eb;
      color: #fff;
    }
    button.primary:not(:disabled):hover { background: #1d4ed8; }
    button.secondary {
      background: #e5e7eb;
      color: #1a1a1a;
    }
    button.secondary:not(:disabled):hover { background: #d1d5db; }
    button.danger {
      background: #dc2626;
      color: #fff;
    }
    button.danger:not(:disabled):hover { background: #b91c1c; }

    .status-line {
      font-size: 0.85rem;
      color: #555;
    }
    .status-line.connected { color: #16a34a; font-weight: 500; }
    .status-line.error     { color: #dc2626; }

    /* ---- log ---- */
    .log-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.35rem;
    }

    #log {
      background: #0f172a;
      color: #e2e8f0;
      font-family: "SF Mono", "Fira Mono", "Cascadia Code", "Consolas",
                   "Menlo", monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      white-space: pre;
      overflow-x: auto;
      border-radius: 8px;
      padding: 0.9rem 1rem;
      min-height: 180px;
      max-height: 480px;
      overflow-y: auto;
    }

    #log .log-err  { color: #f87171; }
    #log .log-send { color: #93c5fd; }
    #log .log-recv { color: #86efac; }
    #log .log-info { color: #fbbf24; }

    #touch-canvas {
      display: block;
      width: 100%;
      max-width: 1200px;
      margin: 16px auto;
      aspect-ratio: 2880 / 2160;
      background: #fafafa;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
<div class="page">
  <h1>touchforce.v1 test harness</h1>

  <!-- Web Serial availability banner -->
  <div id="no-serial-banner" class="banner banner-warn hidden">
    Web Serial not available — open this page in Chrome or Edge on desktop.
    Firefox and Safari don't support the Web Serial API.
  </div>

  <!-- Controls -->
  <div class="controls">
    <button id="btn-connect"    class="primary"   >Connect</button>
    <button id="btn-disconnect" class="danger"    disabled>Disconnect</button>
    <button id="btn-uptime"     class="secondary" disabled>Get Uptime</button>
    <button id="btn-stream"     class="secondary" disabled>Streaming: ON</button>
    <button id="btn-telemetry"  class="primary"   disabled>Get Telemetry</button>
    <button id="addAreaButton"  class="secondary" disabled>Add area: OFF</button>
    <button id="hapticModeButton" class="secondary" disabled>Haptic mode: ?</button>
    <button id="clearAllAreasButton" class="danger" disabled>Clear all areas</button>
  </div>

  <div id="status-line" class="status-line">Not connected</div>

  <!-- Touch canvas -->
  <canvas id="touch-canvas"></canvas>

  <!-- Log -->
  <div class="log-label" style="margin-top:1.25rem;">Log</div>
  <div id="log"></div>
</div>

<!-- protobufjs full build for runtime proto parsing -->
<script src="https://cdn.jsdelivr.net/npm/protobufjs@7/dist/protobuf.min.js"></script>
<script>
"use strict";

// ---------------------------------------------------------------------------
// Inlined proto schema — kept in sync manually with protocol/touch_force.proto
// ---------------------------------------------------------------------------
const schemaText = `syntax = "proto3";

package touchforce.v1;

// Top-level wrapper for every COBS frame on the wire, regardless
// of direction. Receivers always pb_decode(Frame) first, then
// switch on which_kind. Adding a new top-level kind in the future
// (heartbeats, log lines, etc.) is one more oneof variant here.
message Frame {
  oneof kind {
    Request  request  = 1;
    Response response = 2;
    Event    event    = 3;
  }
}

// Host -> MCU command messages.
//
// Conventions (v2-relaxed from v1):
//   - request_id: opaque uint32 chosen by the host, echoed by the
//     MCU in Response.request_id when a Response is sent. SHOULD
//     be non-zero (proto3 elides zero defaults on the wire). Some
//     commands are fire-and-forget and produce no Response; for
//     those the host doesn't track the id.
//   - Field 2 in both Request and Response is reserved for
//     Response.error. Command oneof slots start at field 3.
//   - Parallel field numbers across Request and Response when
//     both messages have the slot. Gaps in either oneof are
//     acceptable for fire-and-forget commands.
message Request {
  uint32 request_id = 1;
  // field 2 reserved for Response.error symmetry
  oneof payload {
    GetUptimeRequest             get_uptime              = 3;
    SetTouchStreamingRequest     set_touch_streaming     = 4;
    GetTelemetryRequest          get_telemetry           = 5;
    SetHapticAreaRequest         set_haptic_area         = 6;
    GetHapticAreaRequest         get_haptic_area         = 7;
    GetHapticAreaListRequest     get_haptic_area_list    = 8;
    DeleteHapticAreaRequest      delete_haptic_area      = 9;
    DeleteAllHapticAreasRequest  delete_all_haptic_areas = 10;
    SetHapticAreaModeRequest     set_haptic_area_mode    = 11;
    GetHapticAreaModeRequest     get_haptic_area_mode    = 12;
  }
}

// MCU -> host reply messages. Always carries the same request_id
// the host sent.
message Response {
  uint32 request_id = 1;
  oneof payload {
    ErrorResponse              error                   = 2;
    GetUptimeResponse          get_uptime              = 3;
    // 4: gap — set_touch_streaming is fire-and-forget
    GetTelemetryResponse       get_telemetry           = 5;
    SetHapticAreaResponse      set_haptic_area         = 6;
    GetHapticAreaResponse      get_haptic_area         = 7;
    GetHapticAreaListResponse  get_haptic_area_list    = 8;
    OkResponse                 delete_haptic_area      = 9;
    OkResponse                 delete_all_haptic_areas = 10;
    SetHapticAreaModeResponse  set_haptic_area_mode    = 11;
    GetHapticAreaModeResponse  get_haptic_area_mode    = 12;
  }
}

// MCU -> host async messages. Not correlated to any Request.
message Event {
  oneof payload {
    TouchFrameEvent touch_frame = 1;
  }
}

message ErrorResponse {
  uint32 code    = 1;
  string message = 2;
}

message GetUptimeRequest  {}
message GetUptimeResponse {
  // Milliseconds since MCU boot (HAL_GetTick wraps at ~49.7 days,
  // documented in protocol/README.md).
  uint32 uptime_ms = 1;
}

// Turn touch-frame streaming on or off. Default at boot is on.
// Fire-and-forget: no response is sent. Reliability comes from
// USB CDC; the host observes the side effect (events stop or
// resume) to confirm.
message SetTouchStreamingRequest {
  bool enabled = 1;
}
// no SetTouchStreamingResponse

message GetTelemetryRequest  {}
message GetTelemetryResponse {
  // Total TouchFrameEvents successfully written to USB CDC since
  // boot. Wraps after ~2 years at 60 Hz.
  uint32 streaming_events_sent = 1;
  // Total CDC_Write returns != USBD_OK during streaming. Both
  // USBD_BUSY (timeout) and USBD_FAIL (lower-layer error) bump
  // this counter.
  uint32 streaming_tx_fails = 2;
}

// One async event per published touch frame from the wisecoco
// USB host. Atomic snapshot of all live fingers at one instant.
message TouchFrameEvent {
  // How many fingers were reported in any state this frame
  // (0..MAX_TOUCHES). Determines how many entries in fingers
  // are meaningful.
  uint32 live_touches = 1;
  // How many fingers were actively touching down this frame.
  uint32 tips_touched_down = 2;
  // One entry per live finger, in [0, live_touches).
  repeated TouchFinger fingers = 3;
}

message TouchFinger {
  // Arbitrary id, stays constant to track this finger DURING a
  // single touch.
  uint32 id = 1;
  // True while this finger is touching. Goes false on the last
  // frame for a given finger (the up event) before the entry
  // disappears.
  bool touching = 2;
  // Coordinates in pixels, post-rotation (firmware sets rotation
  // via USBH_HID_WisecocoSetRotation; ROTATE_90 is the current
  // setting and yields x in [0, 2880], y in [0, 2160]).
  uint32 x = 3;
  uint32 y = 4;
  // Contact patch in pixels, post-rotation. Patch dimensions
  // swap with the axes for ROTATE_90 / ROTATE_270.
  uint32 patch_width  = 5;
  uint32 patch_height = 6;
  // Microseconds since this touch started (id was first seen).
  uint32 touch_duration = 7;
}

// ---- Haptic area types ----

enum HapticAreaKind {
  HAPTIC_AREA_KIND_UNSPECIFIED = 0;
  HAPTIC_AREA_KIND_FIRE        = 1;
  HAPTIC_AREA_KIND_BLOCK       = 2;
}

enum HapticEffect {
  HAPTIC_EFFECT_UNSPECIFIED = 0;
  HAPTIC_EFFECT_DEFAULT     = 1;
}

message HapticAreaRect {
  uint32 x0 = 1;
  uint32 y0 = 2;
  uint32 x1 = 3;
  uint32 y1 = 4;
}

message HapticArea {
  uint32          id      = 1;
  string          tag     = 2;
  HapticAreaRect  rect    = 3;
  bool            enabled = 4;
  HapticAreaKind  kind    = 5;
  HapticEffect    haptic  = 6;
}

message OkResponse {}

message SetHapticAreaRequest  { HapticArea area = 1; }
message SetHapticAreaResponse { HapticArea area = 1; }

message GetHapticAreaRequest  { uint32 id = 1; }
message GetHapticAreaResponse { HapticArea area = 1; }

message GetHapticAreaListRequest  {}
message GetHapticAreaListResponse {
  repeated uint32 ids = 1 [packed = true];
}

message DeleteHapticAreaRequest      { uint32 id = 1; }
message DeleteAllHapticAreasRequest  {}

message SetHapticAreaModeRequest  { bool enabled = 1; }
message SetHapticAreaModeResponse { bool enabled = 1; }

message GetHapticAreaModeRequest  {}
message GetHapticAreaModeResponse { bool enabled = 1; }
`;

// ---------------------------------------------------------------------------
// Protobuf setup
// ---------------------------------------------------------------------------
let Frame, RequestType, ResponseType, Event;
try {
  const root = protobuf.parse(schemaText, { keepCase: false }).root;
  Frame        = root.lookupType("touchforce.v1.Frame");
  RequestType  = root.lookupType("touchforce.v1.Request");
  ResponseType = root.lookupType("touchforce.v1.Response");
  Event        = root.lookupType("touchforce.v1.Event");
} catch (e) {
  logErr("Failed to parse proto schema: " + e.message);
}

// ---------------------------------------------------------------------------
// COBS encode / decode — ported verbatim from host/touch_force_cli/link.py
// ---------------------------------------------------------------------------

class FramingError extends Error {
  constructor(msg) { super(msg); this.name = "FramingError"; }
}

/**
 * COBS-encode data (Uint8Array). Output never contains 0x00.
 * Port of cobs_encode() from link.py.
 */
function cobsEncode(data) {
  const out = [];
  // Reserve slot for leading overhead byte; patched at end of each segment.
  out.push(0);
  let codeIndex = 0;
  let code = 1; // number of bytes in current segment + 1

  for (const byte of data) {
    if (byte === 0) {
      out[codeIndex] = code;
      codeIndex = out.length;
      out.push(0); // placeholder for next segment's code
      code = 1;
    } else {
      out.push(byte);
      code += 1;
      if (code === 0xFF) {
        // Segment is full; close it and open a new one.
        out[codeIndex] = code;
        codeIndex = out.length;
        out.push(0);
        code = 1;
      }
    }
  }

  out[codeIndex] = code;
  return new Uint8Array(out);
}

/**
 * COBS-decode data (Uint8Array). Throws FramingError on malformed input.
 * Port of cobs_decode() from link.py.
 */
function cobsDecode(data) {
  if (data.length === 0) {
    throw new FramingError("empty COBS frame");
  }
  for (const b of data) {
    if (b === 0) throw new FramingError("COBS payload must not contain 0x00");
  }

  const out = [];
  let i = 0;
  const n = data.length;
  while (i < n) {
    const code = data[i];
    if (code === 0) {
      throw new FramingError("zero code byte inside COBS frame");
    }
    const end = i + code;
    if (end > n) {
      throw new FramingError("COBS code byte points past end of frame");
    }
    for (let j = i + 1; j < end; j++) out.push(data[j]);
    i = end;
    if (code !== 0xFF && i < n) {
      out.push(0);
    }
  }
  return new Uint8Array(out);
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
const logEl          = document.getElementById("log");
const statusEl       = document.getElementById("status-line");
const btnConnect     = document.getElementById("btn-connect");
const btnDisconnect  = document.getElementById("btn-disconnect");
const btnUptime      = document.getElementById("btn-uptime");
const btnStream      = document.getElementById("btn-stream");
const btnTelemetry   = document.getElementById("btn-telemetry");
const btnAddArea          = document.getElementById("addAreaButton");
const btnHapticMode       = document.getElementById("hapticModeButton");
const btnClearAllAreas    = document.getElementById("clearAllAreasButton");

function ts() {
  const d = new Date();
  const pad = (n, w=2) => String(n).padStart(w, "0");
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(), 3)}`;
}

function appendLog(text, cls) {
  const span = document.createElement("span");
  if (cls) span.className = cls;
  span.textContent = text + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

function logSend(msg) { appendLog(`${ts()}  → ${msg}`, "log-send"); }
function logRecv(msg) { appendLog(`${ts()}  ← ${msg}`, "log-recv"); }
function logInfo(msg) { appendLog(`${ts()}  · ${msg}`, "log-info"); }
function logErr(msg)  { appendLog(`${ts()}  ✕ ${msg}`, "log-err");  }

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className   = "status-line" + (cls ? " " + cls : "");
}

// ---------------------------------------------------------------------------
// Web Serial availability check
// ---------------------------------------------------------------------------
if (!navigator.serial) {
  document.getElementById("no-serial-banner").classList.remove("hidden");
  btnConnect.disabled = true;
  setStatus("Web Serial unavailable", "error");
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let port     = null;
let isOpen   = false;
let requestCounter = 0;

function nextRequestId() { return ++requestCounter; }

// id -> { id, tag, rect: {x0,y0,x1,y1}, enabled, kind, haptic }
const hapticAreaMap = new Map();
let nextLocalAreaIdx = 1;      // for default tag generation
let dragMode = false;          // toggled by "Add area" button
let dragStartPanel = null;     // {x, y} captured on mousedown
let dragCurrentPanel = null;   // updated during drag for live preview
let hapticAreaModeOn = false;  // mirror of MCU state

// ---------------------------------------------------------------------------
// Connect / Disconnect
// ---------------------------------------------------------------------------

// Open an already-acquired SerialPort and switch the UI to "connected" state.
// Used by both the manual Connect button and the on-load auto-reconnect path.
async function openPort(p) {
  await p.open({ baudRate: 115200 });
  port   = p;
  isOpen = true;

  btnConnect.classList.remove("primary");
  btnConnect.classList.add("secondary");
  btnConnect.textContent = "Connected";
  btnConnect.disabled    = true;
  btnDisconnect.disabled = false;
  btnUptime.disabled     = false;
  btnStream.disabled     = false;
  btnTelemetry.disabled  = false;
  btnAddArea.disabled         = false;
  btnHapticMode.disabled      = false;
  btnClearAllAreas.disabled   = false;

  setStatus("Connected", "connected");
  logInfo("Port opened at 115200 baud");

  port.addEventListener("disconnect", onPortDisconnect);

  // Spawn the continuous read loop. AbortController lets disconnect
  // unwind it cleanly.
  readLoopAbort = new AbortController();
  runReadLoop(readLoopAbort.signal);

  // Seed initial haptic-area state from the device (read loop must be
  // running first so responses can be received).
  try {
    const modeResp = await sendRequest(() => ({ getHapticAreaMode: {} }));
    if (modeResp.payload === "getHapticAreaMode") {
      hapticAreaModeOn = modeResp.getHapticAreaMode.enabled;
      btnHapticMode.textContent = `Haptic mode: ${hapticAreaModeOn ? "ON" : "OFF"}`;
    }
    await refreshHapticAreas();
  } catch (e) {
    console.warn("haptic-area initial fetch failed:", e);
  }
}

// ---- Frame-level send/receive ----------------------------------------------

let pendingByRid = new Map();   // rid -> { resolve, reject } for outstanding requests
let touchEventHandler = null;   // set by canvas init (Task 5.3)
let readLoopAbort = null;       // AbortController for the running reader

async function sendFrame(frame) {
  const bytes = Frame.encode(frame).finish();
  const cobsBytes = cobsEncode(bytes);
  const out = new Uint8Array(cobsBytes.length + 1);
  out.set(cobsBytes, 0);
  out[cobsBytes.length] = 0x00;
  const writer = port.writable.getWriter();
  try {
    await writer.write(out);
  } finally {
    writer.releaseLock();
  }
}

// Send a Frame{request} and wait for the matching Frame{response} via the
// continuous reader. Resolves with the inner Response message.
async function sendRequest(buildRequest) {
  const rid = nextRequestId();
  const frame = Frame.create({
    request: { requestId: rid, ...buildRequest() },
  });
  const promise = new Promise((resolve, reject) => {
    pendingByRid.set(rid, { resolve, reject });
  });
  await sendFrame(frame);
  return promise;
}

// Single read loop spawned at openPort() time. Reads bytes, accumulates
// into frames at 0x00 boundaries, decodes as Frame, dispatches by kind.
async function runReadLoop(signal) {
  const reader = port.readable.getReader();
  try {
    let buf = [];
    while (!signal.aborted) {
      const { value, done } = await reader.read();
      if (done) break;
      for (const b of value) {
        if (b === 0x00) {
          if (buf.length > 0) {
            try {
              dispatchFrame(cobsDecode(new Uint8Array(buf)));
            } catch (e) {
              logErr("Frame dispatch error: " + e.message);
            }
          }
          buf = [];
        } else {
          buf.push(b);
        }
      }
    }
  } catch (e) {
    if (!signal.aborted) logErr("Read loop error: " + e.message);
  } finally {
    reader.releaseLock();
    // Reject any outstanding requests so callers don't hang.
    for (const { reject } of pendingByRid.values()) {
      reject(new Error("Read loop ended"));
    }
    pendingByRid.clear();
  }
}

function dispatchFrame(payloadBytes) {
  const frame = Frame.decode(payloadBytes);
  const kind = frame.kind;
  if (kind === "response") {
    const rid = frame.response.requestId;
    const pending = pendingByRid.get(rid);
    if (pending) {
      pendingByRid.delete(rid);
      pending.resolve(frame.response);
    } else {
      logInfo(`Unmatched Response (request_id=${rid}); discarded`);
    }
  } else if (kind === "event") {
    if (touchEventHandler) {
      touchEventHandler(frame.event);
    }
  } else {
    logInfo(`Unexpected Frame kind: ${kind}`);
  }
}

btnConnect.addEventListener("click", async () => {
  btnConnect.textContent = "Connecting…";
  btnConnect.disabled    = true;
  setStatus("Connecting…");

  try {
    const p = await navigator.serial.requestPort();
    await openPort(p);
  } catch (e) {
    btnConnect.textContent = "Connect";
    btnConnect.disabled    = false;
    setStatus("Not connected");
    if (e.name !== "NotFoundError") {   // user cancelled — no need to log
      logErr("Connect failed: " + e.message);
      setStatus("Connection error", "error");
    }
  }
});

// On page load, try to reopen any previously-authorized port silently.
// getPorts() returns ports the user has already granted access to, so it
// doesn't need a user gesture and won't show the picker.
async function tryAutoConnect() {
  if (!navigator.serial) return;
  const ports = await navigator.serial.getPorts();
  if (ports.length === 0) return;
  // If the user previously authorized multiple ports, just take the first.
  // They can disconnect and re-connect via the picker to choose another.
  try {
    await openPort(ports[0]);
    logInfo("Auto-reconnected to previously authorized port");
  } catch (e) {
    logErr("Auto-reconnect failed: " + e.message);
  }
}

tryAutoConnect();

btnDisconnect.addEventListener("click", async () => {
  await doDisconnect("User disconnected");
});

async function doDisconnect(reason) {
  if (!port) return;
  if (readLoopAbort) {
    readLoopAbort.abort();
    readLoopAbort = null;
  }
  try {
    // Release any lingering locks before close.
    if (port.readable && port.readable.locked) {
      try { await port.readable.cancel(); } catch (_) {}
    }
    if (port.writable && port.writable.locked) {
      try { await port.writable.abort(); } catch (_) {}
    }
    await port.close();
  } catch (e) {
    // Ignore close errors — device may already be gone.
  }
  port   = null;
  isOpen = false;

  btnConnect.textContent = "Connect";
  btnConnect.classList.remove("secondary");
  btnConnect.classList.add("primary");
  btnConnect.disabled    = false;
  btnDisconnect.disabled = true;
  btnUptime.disabled     = true;
  btnStream.disabled     = true;
  btnTelemetry.disabled  = true;
  btnAddArea.disabled         = true;
  btnHapticMode.disabled      = true;
  btnClearAllAreas.disabled   = true;

  setStatus("Not connected");
  logInfo(reason || "Disconnected");
}

function onPortDisconnect() {
  if (!isOpen) return;
  isOpen = false;
  logErr("Device disconnected unexpectedly");
  doDisconnect("Device removed");
}

// ---------------------------------------------------------------------------
// Get Uptime
// ---------------------------------------------------------------------------
btnUptime.addEventListener("click", async () => {
  const rid = requestCounter + 1;  // for log preview only
  logInfo(`→ GetUptimeRequest (request_id=${rid})`);
  try {
    const resp = await sendRequest(() => ({ getUptime: {} }));
    if (resp.payload === "error") {
      logErr(`MCU error: code=${resp.error.code} message="${resp.error.message}"`);
      return;
    }
    if (resp.payload === "getUptime") {
      logInfo(`← uptime: ${resp.getUptime.uptimeMs} ms (request_id=${resp.requestId})`);
      return;
    }
    logErr(`Unexpected response payload: ${resp.payload}`);
  } catch (e) {
    logErr("Get Uptime failed: " + e.message);
  }
});

// Streaming toggle. Fire-and-forget: UI updates optimistically.
let streamingState = true;  // matches firmware default

btnStream.addEventListener("click", async () => {
  const newState = !streamingState;
  const frame = Frame.create({
    request: {
      requestId: nextRequestId(),
      setTouchStreaming: { enabled: newState },
    },
  });
  try {
    await sendFrame(frame);
    streamingState = newState;
    btnStream.textContent = streamingState ? "Streaming: ON" : "Streaming: OFF";
    logInfo(`→ SetTouchStreaming(enabled=${newState})`);
  } catch (e) {
    logErr("SetTouchStreaming failed: " + e.message);
  }
});

btnTelemetry.addEventListener("click", async () => {
  logInfo("→ GetTelemetryRequest");
  try {
    const resp = await sendRequest(() => ({ getTelemetry: {} }));
    if (resp.payload === "error") {
      logErr(`MCU error: code=${resp.error.code} message="${resp.error.message}"`);
      return;
    }
    if (resp.payload === "getTelemetry") {
      const t = resp.getTelemetry;
      const total = t.streamingEventsSent + t.streamingTxFails;
      const rate = total > 0 ? ((t.streamingTxFails / total) * 100).toFixed(3) : "0.000";
      logInfo(`← telemetry: sent=${t.streamingEventsSent} fails=${t.streamingTxFails} (${rate}%)`);
      return;
    }
    logErr(`Unexpected response payload: ${resp.payload}`);
  } catch (e) {
    logErr("Get Telemetry failed: " + e.message);
  }
});

// ---------------------------------------------------------------------------
// Haptic area helpers
// ---------------------------------------------------------------------------

async function refreshHapticAreas() {
  const listResp = await sendRequest(() => ({ getHapticAreaList: {} }));
  if (listResp.payload !== "getHapticAreaList") return;
  const ids = listResp.getHapticAreaList.ids || [];
  hapticAreaMap.clear();
  for (const id of ids) {
    const r = await sendRequest(() => ({ getHapticArea: { id } }));
    if (r.payload === "getHapticArea" && r.getHapticArea.area) {
      const a = r.getHapticArea.area;
      hapticAreaMap.set(id, {
        id: a.id,
        tag: a.tag || "",
        rect: { x0: a.rect.x0|0, y0: a.rect.y0|0, x1: a.rect.x1|0, y1: a.rect.y1|0 },
        enabled: !!a.enabled,
        kind: a.kind,    // numeric (0=UNSPECIFIED, 1=FIRE, 2=BLOCK)
        haptic: a.haptic, // numeric (0=UNSPECIFIED, 1=DEFAULT)
      });
    }
  }
  redrawCanvas();
}

function drawHapticAreasOverlay(ctx, canvas) {
  ctx.lineWidth = 2;
  const dpr = window.devicePixelRatio || 1;
  ctx.font = `${Math.round(14 * dpr)}px monospace`;
  ctx.textAlign = "left";
  ctx.textBaseline = "top";

  for (const a of hapticAreaMap.values()) {
    const sx = canvas.width  / DISPLAY_W_PX;
    const sy = canvas.height / DISPLAY_H_PX;
    const cx = a.rect.x0 * sx;
    const cy = a.rect.y0 * sy;
    const cw = (a.rect.x1 - a.rect.x0) * sx;
    const ch = (a.rect.y1 - a.rect.y0) * sy;

    let strokeColor;
    if (!a.enabled) {
      strokeColor = "gray";
      ctx.setLineDash([8, 4]);
    } else if (a.kind === 2 /* HAPTIC_AREA_KIND_BLOCK */) {
      strokeColor = "red";
      ctx.setLineDash([]);
    } else {
      strokeColor = "lime";
      ctx.setLineDash([]);
    }
    ctx.strokeStyle = strokeColor;
    ctx.strokeRect(cx, cy, cw, ch);

    /* ID label inside the top-left corner of the rect, with a small
     * filled background rectangle so the digits stay legible against
     * the touch ellipses or canvas background. */
    const label = `id=${a.id}`;
    const padX = 4 * dpr;
    const padY = 2 * dpr;
    const metrics = ctx.measureText(label);
    const textH  = Math.round(14 * dpr);
    const boxW   = metrics.width + padX * 2;
    const boxH   = textH + padY * 2;
    ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
    ctx.fillRect(cx, cy, boxW, boxH);
    ctx.fillStyle = strokeColor === "lime" ? "#0a6b0a" : strokeColor;
    ctx.fillText(label, cx + padX, cy + padY);
  }
  ctx.setLineDash([]);

  // Live drag preview while creating an area.
  if (dragStartPanel && dragCurrentPanel) {
    const sx = canvas.width  / DISPLAY_W_PX;
    const sy = canvas.height / DISPLAY_H_PX;
    const x0 = Math.min(dragStartPanel.x, dragCurrentPanel.x);
    const y0 = Math.min(dragStartPanel.y, dragCurrentPanel.y);
    const x1 = Math.max(dragStartPanel.x, dragCurrentPanel.x);
    const y1 = Math.max(dragStartPanel.y, dragCurrentPanel.y);
    ctx.strokeStyle = "yellow";
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(x0 * sx, y0 * sy, (x1 - x0) * sx, (y1 - y0) * sy);
    ctx.setLineDash([]);
  }
}

function canvasToPanel(canvas, offsetX, offsetY) {
  return {
    x: Math.max(0, Math.min(DISPLAY_W_PX, Math.round(offsetX * DISPLAY_W_PX / canvas.width))),
    y: Math.max(0, Math.min(DISPLAY_H_PX, Math.round(offsetY * DISPLAY_H_PX / canvas.height))),
  };
}

// ---- Touch canvas rendering ------------------------------------------------
//
// DISPLAY_W_PX / DISPLAY_H_PX are the rotated display dimensions —
// firmware sets USBH_HID_WisecocoSetRotation(USBH_WC_ROTATE_90), which
// swaps the axes. If the firmware rotation changes, update these.
const DISPLAY_W_PX = 2880;
const DISPLAY_H_PX = 2160;

const canvas = document.getElementById("touch-canvas");
const ctx = canvas.getContext("2d");
let lastFrame = null;  // last rendered TouchFrameEvent for hollow-on-release semantics

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = canvas.clientWidth  * dpr;
  canvas.height = canvas.clientHeight * dpr;
  drawCanvas();
}
window.addEventListener("resize", resizeCanvas);

function drawCanvas() {
  ctx.fillStyle = "#fafafa";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const scaleX = canvas.width  / DISPLAY_W_PX;
  const scaleY = canvas.height / DISPLAY_H_PX;

  // Touch ellipses are conditional: only drawn once a TouchFrameEvent
  // has been received and cached in lastFrame. The haptic-area overlay
  // below runs unconditionally so newly-added areas show up immediately
  // (refreshHapticAreas → redrawCanvas, before any touch has occurred).
  if (lastFrame) {
    ctx.font = `${Math.round(20 * (window.devicePixelRatio || 1))}px monospace`;
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";

    for (const f of lastFrame.fingers) {
      const cx = f.x * scaleX;
      const cy = f.y * scaleY;
      const rx = (f.patchWidth  / 2) * scaleX;
      const ry = (f.patchHeight / 2) * scaleY;
      ctx.beginPath();
      ctx.ellipse(cx, cy, Math.max(rx, 4), Math.max(ry, 4), 0, 0, 2 * Math.PI);
      if (f.touching) {
        ctx.fillStyle = "rgba(40, 80, 200, 0.55)";
        ctx.fill();
        ctx.strokeStyle = "rgba(40, 80, 200, 0.9)";
        ctx.lineWidth = 2;
        ctx.stroke();
      } else {
        ctx.strokeStyle = "rgba(150, 150, 150, 0.7)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // ID label just above the ellipse top edge.
      ctx.fillStyle = "#222";
      ctx.fillText(`id=${f.id}`, cx, cy - ry - 6);
    }
  }

  drawHapticAreasOverlay(ctx, canvas);
}

// Redraw the canvas using the latest cached frame and haptic-area map.
// Called on every touch event and also any time hapticAreaMap changes
// (e.g. after refreshHapticAreas or clear-all), so the overlay stays
// current without waiting for the next finger landing.
function redrawCanvas() {
  drawCanvas();
}

// Wire the dispatcher's event handler. Each touch_frame event becomes
// the new "lastFrame" and triggers a redraw.
touchEventHandler = (event) => {
  if (event.payload !== "touchFrame") return;
  lastFrame = event.touchFrame;
  redrawCanvas();
};

// ---- Canvas drag-to-add mouse handlers ------------------------------------

canvas.addEventListener("mousedown", (e) => {
  if (!dragMode) return;
  dragStartPanel = canvasToPanel(canvas, e.offsetX, e.offsetY);
  dragCurrentPanel = dragStartPanel;
});

canvas.addEventListener("mousemove", (e) => {
  if (!dragMode || !dragStartPanel) return;
  dragCurrentPanel = canvasToPanel(canvas, e.offsetX, e.offsetY);
});

canvas.addEventListener("mouseup", async (e) => {
  if (!dragMode || !dragStartPanel) return;
  const end = canvasToPanel(canvas, e.offsetX, e.offsetY);
  const start = dragStartPanel;
  dragStartPanel = null;
  dragCurrentPanel = null;

  const x0 = Math.min(start.x, end.x);
  const x1 = Math.max(start.x, end.x);
  const y0 = Math.min(start.y, end.y);
  const y1 = Math.max(start.y, end.y);
  // Reject too-small drags (stray clicks).
  if (x1 - x0 < 50 || y1 - y0 < 50) return;

  const tag = `area-${nextLocalAreaIdx++}`;
  try {
    const resp = await sendRequest(() => ({
      setHapticArea: {
        area: {
          id: 0,
          tag,
          rect: { x0, y0, x1, y1 },
          enabled: true,
          kind: 1,    // HAPTIC_AREA_KIND_FIRE
          haptic: 1,  // HAPTIC_EFFECT_DEFAULT
        },
      },
    }));
    if (resp.payload === "setHapticArea" && resp.setHapticArea.area) {
      await refreshHapticAreas();
    }
  } catch (err) {
    logErr("SetHapticArea failed: " + err.message);
  }
});

canvas.addEventListener("mouseleave", () => {
  // Drop the in-progress drag if the mouse leaves without releasing.
  dragStartPanel = null;
  dragCurrentPanel = null;
});

// ---- Haptic area button handlers ------------------------------------------

btnAddArea.addEventListener("click", () => {
  dragMode = !dragMode;
  btnAddArea.textContent = `Add area: ${dragMode ? "ON" : "OFF"}`;
});

btnHapticMode.addEventListener("click", async () => {
  try {
    const resp = await sendRequest(() => ({
      setHapticAreaMode: { enabled: !hapticAreaModeOn },
    }));
    if (resp.payload === "setHapticAreaMode") {
      hapticAreaModeOn = resp.setHapticAreaMode.enabled;
      btnHapticMode.textContent = `Haptic mode: ${hapticAreaModeOn ? "ON" : "OFF"}`;
    }
  } catch (err) {
    logErr("SetHapticAreaMode failed: " + err.message);
  }
});

btnClearAllAreas.addEventListener("click", async () => {
  try {
    const resp = await sendRequest(() => ({ deleteAllHapticAreas: {} }));
    if (resp.payload === "deleteAllHapticAreas") {
      logInfo("← DeleteAllHapticAreas OK");
      await refreshHapticAreas();
    } else {
      logErr(`Unexpected response to DeleteAllHapticAreas: ${resp.payload}`);
    }
  } catch (err) {
    logErr("DeleteAllHapticAreas failed: " + err.message);
  }
});

// Initial sizing pass after layout settles.
window.addEventListener("load", resizeCanvas);
</script>
</body>
</html>
